min_version: 1.10.10

pre-commit:
  piped: true
  commands:
    rustfmt:
      priority: 1
      glob: "*.rs"
      run: rustfmt --edition 2024 {staged_files}
      stage_fixed: true

    clippy-fix:
      priority: 2
      glob:
        - "*.rs"
        - "Cargo.toml"
        - "Cargo.lock"
      run: cargo clippy --fix --allow-dirty --allow-staged --all-targets --all-features -- -D warnings
      stage_fixed: true

    cargo-check:
      priority: 3
      glob:
        - "*.rs"
        - "Cargo.toml"
        - "Cargo.lock"
      run: cargo check --all-targets --all-features
